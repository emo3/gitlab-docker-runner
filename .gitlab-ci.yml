stages:
  - build

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  CI_REGISTRY_INTERNAL: "gitlab-registry.gitlab.svc.cluster.local:5000"
  IMAGE_COMMIT_TAG: "$CI_REGISTRY_INTERNAL/$CI_PROJECT_PATH:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST_TAG: "$CI_REGISTRY_INTERNAL/$CI_PROJECT_PATH:latest"
  OPENTOFU_VERSION: "1.12.3"
  PACKER_VERSION: "1.15.4"

build-verify-push:
  stage: build
  image: docker:29-cli
  services:
    - name: docker:29-dind
      alias: docker
      command:
        - "--tls=false"
        - "--insecure-registry=gitlab-registry.gitlab.svc.cluster.local:5000"
  tags:
    - k8s
  before_script:
    - |
      for i in $(seq 1 30); do
        docker info && break
        sleep 2
      done
    - docker version
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY_INTERNAL" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - >
      docker build
      --build-arg OPENTOFU_VERSION="$OPENTOFU_VERSION"
      --build-arg PACKER_VERSION="$PACKER_VERSION"
      --tag "$IMAGE_COMMIT_TAG"
      --tag "$IMAGE_LATEST_TAG"
      .
    - docker run --rm "$IMAGE_COMMIT_TAG" /usr/local/bin/verify-tools.sh
    - docker push "$IMAGE_COMMIT_TAG"
    - docker push "$IMAGE_LATEST_TAG"
